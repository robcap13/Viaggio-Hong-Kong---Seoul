<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hong Kong + Corea — Itinerario di viaggio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12151b;
    --ink-2:#181c24;
    --line-dark:#323a46;
    --paper:#f7f3e8;
    --paper-2:#efe8d4;
    --paper-line:#ddd2b3;
    --text:#211f19;
    --text-soft:#736c58;
    --cream:#f3efe2;
    --text-dim:#9aa3ae;
    --hk:#ff5d73;
    --jeju:#e08e2b;
    --busan:#2f8fd6;
    --gj:#b6903a;
    --seoul:#8a5fc0;
    --info:#59c2a6;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--text);
    font-family:'Space Grotesk',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{font-family:'Fraunces',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  em{font-family:'Fraunces',serif;font-style:italic;}

  /* ---------- layout shell ---------- */
  .shell{display:flex;min-height:100vh;}

  /* ---------- sidebar ---------- */
  .sidebar{
    width:280px;flex-shrink:0;
    background:var(--ink-2);
    border-right:1px solid var(--line-dark);
    padding:24px 0 40px;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{padding:0 22px 18px;border-bottom:1px solid var(--line-dark);margin-bottom:10px;}
  .brand .stamp{
    display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10.5px;
    letter-spacing:.12em;color:var(--info);border:1px solid var(--info);
    border-radius:20px;padding:3px 9px;text-transform:uppercase;margin-bottom:10px;
  }
  .brand h1{font-size:22px;margin:0 0 4px;line-height:1.12;color:var(--cream);font-weight:600;}
  .brand h1 em{color:var(--info);}
  .brand p{margin:0;font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}

  .navgroup{margin-top:6px;}
  .navgroup-label{
    padding:14px 22px 6px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--text-dim);font-family:'JetBrains Mono',monospace;
  }
  .region-block{margin-bottom:2px;}
  .region-head{
    display:flex;align-items:center;gap:9px;padding:9px 22px;cursor:default;
    font-size:13.5px;color:var(--cream);font-weight:600;font-family:'Fraunces',serif;
  }
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .daylink{
    display:flex;align-items:baseline;gap:10px;width:100%;text-align:left;
    background:none;border:none;color:var(--text-dim);cursor:pointer;
    padding:7px 22px 7px 39px;font-size:13px;font-family:'Space Grotesk',sans-serif;
    border-left:2px solid transparent;transition:.15s;
  }
  .daylink:hover{color:var(--text);background:rgba(255,255,255,.03);}
  .daylink.active{color:var(--cream);border-left-color:var(--accent,var(--info));background:rgba(255,255,255,.05);font-weight:600;}
  .daylink .num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
  .infolink{
    display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;
    color:var(--text-dim);cursor:pointer;padding:9px 22px;font-size:13px;font-family:'Space Grotesk',sans-serif;
    border-left:2px solid transparent;
  }
  .infolink:hover{color:var(--text);}
  .infolink.active{color:var(--cream);border-left-color:var(--info);background:rgba(255,255,255,.05);font-weight:600;}

  .menu-toggle{display:none;}

  /* ---------- main ---------- */
  main{flex:1;min-width:0;background:var(--paper);color:var(--text);}
  .page{max-width:960px;margin:0 auto;padding:0 0 110px;}

  /* ---------- hero ---------- */
  .hero{
    position:relative;min-height:400px;display:flex;align-items:flex-end;
    background-size:cover;background-position:center;color:#fff;
    padding:40px 44px 34px;overflow:hidden;
  }
  .hero::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(10,12,16,.15) 0%, rgba(10,12,16,.35) 45%, rgba(10,12,16,.92) 100%),
               linear-gradient(90deg, var(--accent) 0%, transparent 55%);
    opacity:.9;
  }
  .hero-inner{position:relative;z-index:1;width:100%;}
  .hero-eyebrow{
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    opacity:.9;margin-bottom:10px;display:flex;align-items:center;gap:10px;
  }
  .hero-eyebrow .sep{opacity:.5;}
  .hero h2{font-size:44px;line-height:1.03;margin:0 0 10px;font-weight:500;}
  .hero h2 em{font-weight:400;}
  .hero .sub{font-size:15px;opacity:.92;font-family:'JetBrains Mono',monospace;}

  .stats-row{
    display:flex;flex-wrap:wrap;gap:0;
    background:var(--ink);color:var(--cream);position:relative;z-index:1;
  }
  .stat{
    flex:1;min-width:150px;padding:16px 22px;border-right:1px solid rgba(255,255,255,.12);
  }
  .stat:last-child{border-right:none;}
  .stat b{display:block;font-family:'Fraunces',serif;font-size:19px;font-weight:500;margin-bottom:2px;}
  .stat span{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.65;}

  .content-pad{padding:0 44px;}

  /* section blocks */
  .block-title{
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-soft);
    font-family:'JetBrains Mono',monospace;margin:44px 0 16px;display:flex;align-items:center;gap:10px;
  }
  .block-title::before{content:"§";color:var(--accent);font-family:'Fraunces',serif;font-style:italic;font-size:14px;}
  .block-title::after{content:"";flex:1;height:1px;background:var(--paper-line);}

  .note-box{
    background:var(--paper-2);border:1px dashed var(--paper-line);border-radius:10px;
    padding:16px 18px;font-size:14px;line-height:1.6;color:var(--text-soft);font-style:italic;margin:20px 44px 0;
  }

  /* timeline */
  .timeline{border-left:2px solid var(--paper-line);margin-left:6px;padding-left:22px;}
  .tl-item{position:relative;padding-bottom:14px;display:flex;gap:14px;align-items:flex-start;}
  .tl-item::before{content:"";position:absolute;left:-28px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--accent);}
  .tl-time{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);font-weight:600;
    flex-shrink:0;width:52px;padding-top:1px;}
  .tl-text{font-size:14.5px;line-height:1.45;padding:7px 12px;border-radius:9px;flex:1;}
  .tl-item.visit .tl-text{background:#fffdf8;border:1px solid var(--paper-line);}
  .tl-item.meal .tl-text{background:#fbeed9;border:1px solid #e9d7ae;}
  .tl-item.meal .tl-text::before{content:"🍜 ";}
  .tl-item.logistics .tl-text{background:transparent;border:1px dashed #c9bd9c;color:var(--text-soft);font-style:italic;font-size:13.3px;}
  .tl-item.transfer{opacity:.92;}
  .tl-item.transfer .tl-text{background:none;border:none;padding:2px 0 2px 2px;color:#6d6656;font-size:13px;
    font-family:'JetBrains Mono',monospace;}
  .tl-item.transfer .tl-text::before{content:"→ ";color:var(--accent);font-weight:700;}
  .tl-item.transfer .tl-time{color:#8a8271;font-weight:500;}
  .tl-item.transfer::before{background:transparent;border:2px solid var(--accent);}

  .legend{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px;font-size:12px;color:var(--text-soft);font-family:'JetBrains Mono',monospace;}
  .legend span{display:flex;align-items:center;gap:6px;}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;background:var(--accent);}
  .legend i.meal-i{background:#e0a94a;border-radius:3px;}
  .legend i.transfer-i{background:none;border:2px solid var(--accent);}
  .legend i.logistics-i{background:none;border:1px dashed #8a8271;}

  /* gallery / place cards */
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:26px;}
  .g-card{display:flex;flex-direction:column;}
  .g-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--paper-2);border-radius:2px;}
  .g-img-ph{
    width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-style:italic;font-size:17px;color:#fff;text-align:center;padding:14px;
    background:linear-gradient(135deg,var(--accent),#20242c);border-radius:2px;
  }
  .g-cap{display:flex;justify-content:space-between;align-items:baseline;margin:10px 0 4px;gap:10px;}
  .g-cap h4{margin:0;font-size:17px;font-family:'Fraunces',serif;font-weight:600;}
  .g-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);flex-shrink:0;}
  .g-card p{margin:0 0 9px;font-size:13.3px;line-height:1.55;color:#4a4638;}
  .tip{
    font-size:12.3px;line-height:1.5;color:var(--text-soft);display:flex;gap:7px;
    border-top:1px solid var(--paper-line);padding-top:8px;font-style:italic;
  }
  .tip b{flex-shrink:0;color:var(--accent);font-style:normal;}

  .foot-nav{display:flex;justify-content:space-between;margin:56px 44px 0;gap:14px;border-top:1px solid var(--paper-line);padding-top:22px;}
  .foot-btn{
    flex:1;background:none;border:none;color:var(--text);padding:0;
    cursor:pointer;text-align:left;font-family:'Space Grotesk',sans-serif;transition:.15s;
  }
  .foot-btn:hover .nm{color:var(--accent);}
  .foot-btn.right{text-align:right;}
  .foot-btn .lbl{display:block;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-soft);margin-bottom:6px;}
  .foot-btn .nm{font-size:16px;font-family:'Fraunces',serif;transition:.15s;}
  .foot-btn:disabled{opacity:.3;cursor:default;}

  /* info page */
  .info-hero{
    position:relative;background:linear-gradient(180deg, rgba(10,12,16,.2) 0%, rgba(10,12,16,.94) 100%),
    url('https://commons.wikimedia.org/wiki/Special:FilePath/Seoul%20at%20N%20Seoul%20Tower.jpg?width=1600');
    background-size:cover;background-position:center;
    color:#fff;padding:50px 44px 34px;min-height:320px;display:flex;align-items:flex-end;
  }
  .info-hero-inner{max-width:640px;}
  .info-hero .hero-eyebrow{color:var(--info);}
  .info-hero h2{font-size:38px;margin:0 0 12px;font-family:'Fraunces',serif;font-weight:500;}
  .info-hero p{margin:0;font-size:14.5px;line-height:1.6;opacity:.95;}
  .info-stats{display:flex;flex-wrap:wrap;background:var(--ink);color:var(--cream);}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:32px 44px 0;}
  @media(max-width:720px){.info-grid{grid-template-columns:1fr;}}
  .info-card{background:#fffdf8;border:1px solid var(--paper-line);border-radius:2px;padding:20px 22px;}
  .info-card h3{margin:0 0 12px;font-size:16.5px;font-family:'Fraunces',serif;font-weight:600;display:flex;align-items:center;gap:9px;}
  .info-card ul{margin:0;padding-left:18px;font-size:13.5px;line-height:1.65;color:#3d3a30;}
  .info-card li{margin-bottom:7px;}
  .info-card p{font-size:13.5px;line-height:1.65;color:#3d3a30;margin:0 0 8px;}

  .hidden{display:none !important;}

  /* mobile */
  @media(max-width:900px){
    .sidebar{
      position:fixed;left:0;top:0;z-index:40;transform:translateX(-100%);transition:.25s;
      box-shadow:10px 0 30px rgba(0,0,0,.4);width:270px;
    }
    .sidebar.open{transform:translateX(0);}
    .menu-toggle{
      display:flex;align-items:center;gap:8px;position:fixed;top:16px;left:16px;z-index:50;
      background:var(--ink-2);color:var(--cream);border:1px solid var(--line-dark);border-radius:10px;
      padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;
    }
    .hero{padding:80px 22px 26px;min-height:320px;}
    .hero h2{font-size:32px;}
    .content-pad{padding:0 22px;}
    .note-box{margin:20px 22px 0;}
    .info-grid{margin:28px 22px 0;}
    .info-hero{padding:80px 22px 26px;}
    .foot-nav{margin:44px 22px 0;}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30;}
    .overlay.show{display:block;}
  }
</style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">☰ &nbsp;Itinerario</button>
<div class="overlay" id="overlay"></div>

<div class="shell">
  <nav class="sidebar" id="sidebar">
    <div class="brand">
      <span class="stamp">✈ boarding pass</span>
      <h1>Hong Kong<br>+ <em>Corea del Sud</em></h1>
      <p>15 — 30 agosto 2026 · 16 giorni</p>
    </div>
    <div id="navContent"></div>
  </nav>

  <main>
    <div class="page" id="page"></div>
  </main>
</div>

<script>
/* ============================================================
   DATA
   ============================================================ */
const REGIONS = {
  info:   { label:"Prima di partire", color:"var(--info)" },
  hk:     { label:"Hong Kong",  color:"var(--hk)" },
  jeju:   { label:"Isola di Jeju", color:"var(--jeju)" },
  busan:  { label:"Busan", color:"var(--busan)" },
  gj:     { label:"Gyeongju", color:"var(--gj)" },
  seoul:  { label:"Seoul", color:"var(--seoul)" },
};

const HERO_IMG = {
  hk:    "https://commons.wikimedia.org/wiki/Special:FilePath/Hong%20Kong%20Night%20Skyline.jpg?width=1600",
  jeju:  "https://commons.wikimedia.org/wiki/Special:FilePath/Seongsan%20Ilchulbong%2C%20Jeju%20Island.jpg?width=1600",
  busan: "https://commons.wikimedia.org/wiki/Special:FilePath/Gamcheon%20Cultural%20Village%2C%20Busan.jpg?width=1600",
  gj:    "https://commons.wikimedia.org/wiki/Special:FilePath/Daeungjeon%2C%20Seokgatap%20and%20Dabotap.jpg?width=1600",
  seoul: "https://commons.wikimedia.org/wiki/Special:FilePath/Seoul%20Gyeongbokgung%20palace%20exterior%20view.jpg?width=1600",
};

const DAYS = [
{
  id:1, region:"hk", date:"Sab 15 Agosto", city:"Hong Kong", hotel:"Hotel a Hong Kong (da confermare)",
  flight:"Volo Napoli → Hong Kong (Lufthansa)",
  note:"Sezione in aggiornamento: appena mi invierai il file con i dettagli di Hong Kong, la completo con lo stesso livello di dettaglio (orari, spostamenti, luoghi) delle altre tappe.",
  schedule:[], places:[]
},
{
  id:2, region:"hk", date:"Dom 16 Agosto", city:"Hong Kong", hotel:"Hotel a Hong Kong (da confermare)",
  note:"Sezione in aggiornamento: in attesa del tuo file con l'itinerario di Hong Kong.",
  schedule:[], places:[]
},
{
  id:3, region:"hk", date:"Lun 17 Agosto", city:"Hong Kong", hotel:"Hotel a Hong Kong (da confermare)",
  note:"Sezione in aggiornamento: in attesa del tuo file con l'itinerario di Hong Kong.",
  schedule:[], places:[]
},

{
  id:4, region:"jeju", date:"Mar 18 Agosto", city:"Isola di Jeju", hotel:"Co-op City Hotel Seongsan",
  flight:"Volo Hong Kong → Jeju",
  schedule:[
    {time:"06:30", text:"Arrivo Jeju", type:"logistics"},
    {time:"07:30", text:"Ritiro macchina", type:"logistics"},
    {time:"08:00", text:"Partenza per Gimnyeong Beach [1h]", type:"transfer"},
    {time:"09:00", text:"Gimnyeong Beach", type:"visit"},
    {time:"13:00", text:"Pranzo: Ory Fishmarket <br><br> In alternativa Mongtan Jeju Branch (BBQ)", type:"meal"},
    {time:"14:30", text:"Partenza per Manjanggul Lava Tube [5min]", type:"transfer"},
    {time:"15:00", text:"Manjanggul Lava Tube", type:"visit"},
    {time:"16:00", text:"Partenza per Snoopy Garden [30min]", type:"transfer"},
    {time:"16:30", text:"Snoopy Garden <br><br> In alternativa Aqua Planet Jeju", type:"visit"},
    {time:"18:00", text:"Partenza per Seopjikoji [30min]", type:"transfer"},
    {time:"18:30", text:"Seopjikoji", type:"visit"},
    {time:"20:00", text:"Cena: Geumdot Seongsan Black Pork", type:"meal"},
    {time:"21:30", text:"Arrivo in Hotel - Co-op City Hotel Seongsan", type:"logistics"}
  ],
  places:[
    {n:"[6:30] Aeroporto Jeju", d:"Alle 6:30 atterreremo a Jeju.", img:"Aeroporto Jeju.jpg", tip:"Superati i controlli si consiglia di prendersi un attimo di tempo per organizzare uno zaino per la giornata, con l'occorrente per il mare non dimenticare quindi: un costume, un telo mare, le infradito, la protezione solare e un cambio per il resto delle attività della giornata"},
    {n:"[7:30] Ritiro auto", d:"Alle 7:30 è previsto il ritiro auto. Lo spostamento verso la tappa successiva durerà circa 1h", img:"gim-11.webp", tip:"La prenotazione dell'auto è a nome di Francesco ed è stata fatta su Trip.com", move:"Partenza alle 08:00 verso Gimnyeong Beach (circa 1h).<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 제주시 구좌읍 해맞이해안로 7-6"},
    {n:"[9:00] Gimnyeong Beach", d:"Spiaggia dalle acque turchesi e poco profonde sulla costa nord-est di Jeju, meno affollata delle spiagge del sud. Qui passeremo qualche ora sulla spiaggia per riposarci", img:"gim-11.webp", tip:"Si consiglia di provare a recuperare qualche ora di sonno persa per il viaggio notturno.", move:"Ory Fishmarket è nello stesso villaggio di Gimnyeong, a pochi minuti di auto.<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 제주시 구좌읍 김녕로21길 21"},
    {n:"[13:00] Pranzo: Ory Fishmarket", d:"Per il pranzo il locale individuato è Ory Fishmarket. Le specialità sono 제주딱새우회 (Jeju ttak-saeu hoe) – gamberi mantide crudi (una specialità locale di Jeju), ma si consiglia anche il sashimi", img:"Ory Fishmarket.jpg", tip:"<b>Piatti principali (in alto):</b><br><b>돔베사시미 (Dombe Sashimi)</b> – Sashimi misto servito su un tagliere di legno.<br><b>제주딱새우회 (Jeju ttak-saeu hoe)</b> – Gamberi mantide crudi<br><br><b>Riga centrale:</b><br><b>숯불 뿔소라구이</b> – Lumache di mare (turbo/conch) grigliate alla brace<br><b>쨍소라회</b> – Lumache di mare crude<br><b>돌문어</b> – Polpo di roccia (crudo/bollito)<br><br><b>Riga in basso:</b><br><b>숯불 가마살구이</b> – Guancia/pancia di pesce grigliata alla brace<br><b>숯불 고등어구이</b> – Sgombro grigliato alla brace<br><b>딱새우라면</b> – Ramen con gamberi mantide<br><br><b>In basso a destra (contorni/extra)</b>", move:"Partenza alle 14:30 verso Manjanggul Lava Tube (circa 5 min).<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 제주시 구좌읍 만장굴길 182"},
    {n:"[15:00] Manjanggul Lava Tube", d:"Uno dei tubi di lava più lunghi al mondo (quasi 7 km, un tratto di 1 km visitabile), formatosi da eruzioni vulcaniche migliaia di anni fa. Patrimonio UNESCO.<br><br><b>Come si è formato:</b> Manjanggul si è formato tra circa 100.000 e 300.000 anni fa, durante un'intensa attività vulcanica sull'isola di Jeju. Quando la lava fluiva verso il mare, la superficie esterna del flusso si raffreddava e induriva a contatto con l'aria, mentre la lava ancora fusa continuava a scorrere sotto quella crosta solidificata. Quando l'eruzione è terminata e la lava residua è defluita via, è rimasto un enorme tunnel vuoto: è esattamente questo il meccanismo con cui si formano tutti i \"lava tube\" nel mondo.<br><br><b>Dimensioni e primati:</b> È lungo quasi 9 km, il che lo rende uno dei tubi di lava più lunghi al mondo e il secondo più lungo di Jeju. Solo una sezione di circa 1 km (a partire dal secondo dei tre ingressi) è aperta al pubblico — il resto è chiuso per motivi di conservazione. Al suo interno si trova la colonna di lava più alta conosciuta al mondo, alta circa 7,6 metri: si è formata quando la lava che gocciolava dal soffitto si è incontrata e saldata con quella che risaliva dal pavimento.<br><br><b>Perché è importante:</b> Fa parte del sistema di tubi di lava di Geomunoreum, ed è entrato a far parte del Patrimonio Mondiale UNESCO nel 2007 sotto la voce \"Jeju Volcanic Island and Lava Tubes\". Ciò che lo rende scientificamente prezioso è lo stato di conservazione eccezionale: mentre molti tubi di lava nel mondo sono collassati o danneggiati, Manjanggul è rimasto quasi intatto, offrendo ai geologi un vero e proprio laboratorio a cielo aperto per studiare i processi vulcanici.<br><br><b>Cosa vedremo camminando:</b> All'interno troveremo un paesaggio molto diverso dalle grotte calcaree \"classiche\" (niente formazioni bianche e gocciolanti): qui le pareti sono di roccia vulcanica scura, e potremo osservare stalattiti e stalagmiti di lava, colonne laviche, \"flowstone\" (superfici modellate dallo scorrimento), \"lava rafts\" (blocchi di crosta solidificata trascinati dalla corrente) e ripiani laviche lungo le pareti — tutte tracce fisiche del momento esatto in cui la lava si è fermata.<br><br><b>Un dettaglio curioso:</b> Jeju nel suo complesso è un vulcano a scudo ormai inattivo, sulla cui superficie si contano circa 120 grandi tubi di lava e 360 piccoli coni vulcanici (chiamati \"oreum\") sparsi per l'isola — Manjanggul è solo il più celebre di questa rete sotterranea.", img:"Manjanggul Lava Tube.jpg", tip:"Dentro fa fresco tutto l'anno (circa 11-21°C): portate una giacca leggera.", move:"Partenza alle 16:00 verso Snoopy Garden (circa 30 min).<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 제주시 구좌읍 금백조로 930"},
    {n:"[16:30] Snoopy Garden", d:"<b>Cos'è e quando è nato</b><br>Snoopy Garden ha aperto al pubblico il 17 luglio 2020 a Songdang-ri, nel comune di Gujwa-eup, ed è stato il primo giardino tematico dedicato ai Peanuts in Corea. Copre circa 20.000 metri quadrati e comprende cinque padiglioni espositivi al chiuso e undici aree tematiche all'aperto, ognuna ispirata a una scena o a un elemento riconoscibile della striscia a fumetti.<br><br><b>Le origini del fumetto</b><br>Peanuts è la striscia a fumetti creata dal disegnatore americano Charles M. Schulz, debuttata nel 1950 e diventata nel tempo una delle proprietà culturali più riconosciute al mondo, con protagonisti come Snoopy, Charlie Brown, Lucy, Woodstock e Schroeder. I diritti sui personaggi sono oggi condivisi tra WildBrain, Sony Music Entertainment Japan e la famiglia dello stesso Schulz.<br><br><b>Perché è a Jeju</b><br>Il progetto nasce dalla volontà di unire la natura dell'isola all'immaginario dei Peanuts: invece di essere un parco a tema costruito artificialmente, gli spazi esterni sono pensati per valorizzare il paesaggio vulcanico e vegetale tipico di Jeju, integrandoci dentro le ambientazioni della striscia, come il celebre campo da baseball di Charlie Brown o l'albero mangia-aquiloni.<br><br><b>Cosa troveremo</b><br>La parte interna è un piccolo museo che ripercorre la storia del fumetto, con tavole originali, oggetti d'epoca e la biografia di Schulz, mentre la parte esterna è organizzata come un percorso tra ambientazioni fotografiche, tra cui un nido di legno sopraelevato a cinque metri da terra con vista sul parco, e una zona ispirata a un molo affacciato sul mare, con Snoopy ad aspettare i visitatori.", img:"Snoopy garden.jpg", tip:"Buona parte del percorso è all'aperto, quindi conviene evitare le ore più calde in estate o portare un ombrello nei giorni di pioggia, quando peraltro il biglietto viene scontato. L'ingresso non è economico, ma la qualità della cura del sito viene generalmente segnalata come superiore alla media di altre attrazioni a tema sull'isola.<br><br>Normalmente ci vogliono circa 2-3 ore per visitarlo con calma, tra padiglioni interni e giardini esterni. Chi ha spazio nell'itinerario tende a stare sulle 3 ore, includendo una sosta al caffè a tema, mentre chi va di corsa può cavarsela anche in 1-1,5 ore concentrandosi solo sui punti principali. Nel nostro caso avremo poco tempo, e valuteremo a seconda del ritmo della giornata se possiamo fare questa tappa e quanto tempo dedicarci.", move:"Partenza alle 18:00 verso Seopjikoji (circa 30 min).<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 서귀포시 성산읍 섭지코지로 107"},
    {n:"[18:30] Seopjikoji", d:"<b>Cosa significa il nome</b><br>Il nome deriva dal dialetto locale: seopji indica una lingua di terra stretta, koji significa promontorio. Si trova all'estremità orientale dell'isola ed è collegato alla costa principale solo da una lingua di terra sottile, quasi come fosse un'isola a sé.<br><br><b>Come si è formato</b><br>Il promontorio è di origine vulcanica: si è formato dall'accumulo di scoria, la cenere vulcanica rossastra espulsa da un'eruzione, mentre la celebre roccia Seondolbawi, il grande pilastro di roccia che si erge davanti alla costa, è un condotto vulcanico, cioè magma che si è solidificato all'interno del camino del vulcano stesso e col tempo è rimasto esposto dall'erosione.<br><br><b>La leggenda di Seondolbawi</b><br>La roccia è legata a un racconto popolare piuttosto malinconico. Il figlio più giovane del Re Drago del Mare dell'Est si innamorò perdutamente di una fata che scendeva dal cielo per fare il bagno in quelle acque, e volle sposarla. Il padre gli impose però di dimostrare la propria devozione restando fermo e paziente per cento giorni prima di dare il consenso. L'ultimo giorno però si scatenò una tempesta che impedì alla fata di scendere dal cielo per le nozze: il principe, disperato, morì di dolore e si trasformò in pietra, diventando appunto la roccia che vediamo oggi. Ancora oggi si racconta che pronunciare un giuramento d'amore davanti a quella roccia porti fortuna a chi si sposa.<br><br><b>Il collegamento con i K-drama</b><br>Seopjikoji è diventato molto popolare anche grazie a diverse produzioni televisive coreane, in particolare il celebre drama All In (2003), con Lee Byung-hun e Song Hye-kyo, che vi girò diverse scene, incluso un piccolo edificio simile a una chiesa costruito apposta per le riprese. L'edificio originale fu poi distrutto da un tifone e in seguito ricostruito in forma diversa, diventando comunque una tappa fotografica fissa per i visitatori.<br><br><b>Cosa vedremo</b><br>Il percorso costiero è semplice e adatto a tutti, con il faro bianco come punto panoramico principale, i campi di colza che fioriscono ogni aprile creando un contrasto giallo-blu molto fotografato, i cavalli di Jeju al pascolo e, con la bassa marea, formazioni rocciose particolari che normalmente restano sommerse. Lungo la costa è inoltre possibile avvistare le haenyeo, le tradizionali pescatrici subacquee di Jeju.", img:"seopjikoji.jpg", tip:"Il sito è molto ventoso quasi tutto l'anno, quindi conviene portare una giacca anche in giornate calde. Il giro completo dura 20-30 minuti circa fino al faro; l'obiettivo è essere qui al tramonto", move:"Si stima un tragitto di circa 10-15 minuti per raggiungere il ristorante per la cena in auto verso Geumdot.<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 서귀포시 성산읍 성산등용로 17"},
    {n:"[20:00] Cena: Geumdot Seongsan Black Pork", d:"Per cena il locale individuato è Geumdot Seongsan Black Pork. La specialità è la grigliata di maiale nero di Jeju, la carne tipica dell'isola, considerata da più fonti locali \"il vero affare\" del posto.", img:"Geumdot Seongsan Black Pork.jpg", tip:"Il maiale nero (heukdwaeji) è una specialità autoctona di Jeju, allevato sull'isola: la carne è più saporita e meno grassa rispetto al maiale normale.", move:"L'hotel è sulla stessa via (성산등용로), a pochissimi minuti a piedi o in auto.<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 서귀포시 성산읍 성산등용로 28"},
    {n:"[Alternativa in caso di pioggia] Aqua Planet Jeju", d:"Uno dei più grandi acquari della Corea, con squali balena e spettacoli di delfini.", tip:"E' un'alternativa allo Snoopy Garden in caso di pioggia (chiude alle 18:00)"}

  places:[
    {n:"[5:30] Seongsan Ilchulbong (Peak)", d:"Per chi ha piacere di vedere il Picco del Sole Nascente all'alba la sveglia sarà alle 4:30; l'ingresso al percorso apre sempre 1h prima dell'alba e sarebbe comunque opportuno verificare il giorno prima gli orari precisi dell'alba e di apertura. E' una delle esperienze più consigliate sull'isola; per raggiungere la vetta è previsto un percorso di 20-30 min. Chi non vuole svegliarsi presto potra aspettare gli altri in albergo continuando a dormire fino alle 8. Finita la visita torneremo in albergo, per il check out e per caricare le valigie in macchina, la giornata sarà molto fitta e dovremo partire preferibilmente entro le 8:20; è prevista la possibilità di un giro in canoa, si consiglia di valutare un vestiario opportuno e organizzare lo zaino di conseguenza. Laddove la visita non dovesse durare molto potrebbe anche essere possibile farsi un'oretta di sonno. <br><br><b>Come si è formato</b><br>Si è formato circa 5.000 anni fa attraverso un'eruzione idrovulcanica sottomarina: il magma incandescente, entrando in contatto con l'acqua fredda del mare, ha reso la cenere vulcanica particolarmente appiccicosa, che si è poi accumulata a strati fino a creare il cono che vediamo oggi. In origine era un isolotto separato dall'isola principale; solo nel tempo sabbia e detriti hanno formato un istmo naturale che lo ha collegato a Jeju, reso definitivamente percorribile con la costruzione di una strada nel 1940.<br><br><b>Il nome</b><br>Seongsan (castello) deriva dalla forma del cono, che visto da lontano ricorda un'imponente fortezza naturale, mentre Ilchulbong significa letteralmente picco del sorgere del sole, un nome che riflette la sua fama come uno dei migliori punti dell'isola per ammirare l'alba.<br><br><b>Dimensioni</b><br>Il cono si eleva per 182 metri sul livello del mare, con un cratere sommitale a forma di ciotola largo circa 600 metri e profondo 90 metri, oggi ricoperto di erba argentea e altra vegetazione spontanea. Il bordo del cratere è circondato da 99 piccole punte rocciose che gli danno un aspetto simile a una corona.<br><br><b>Una leggenda curiosa</b><br>Si racconta che se Seongsan Ilchulbong avesse avuto 100 picchi invece di 99, Jeju sarebbe oggi popolata da animali feroci come tigri e leoni: mancando proprio quell'ultimo picco, l'isola ne è rimasta priva.<br><br><b>Un capitolo doloroso della storia</b><br>Nel 1943, durante la Seconda guerra mondiale, l'esercito giapponese scavò 24 grotte artificiali lungo le scogliere costiere del promontorio, nascondendovi bombe e siluri in vista di un attacco che alla fine non riuscirono mai a portare a termine, dato che la guerra si concluse prima. Queste stesse grotte furono in seguito riutilizzate come spogliatoi dalle haenyeo, le pescatrici subacquee locali. Anche il passaggio che collega il promontorio all'isola principale, chiamato Tteojinmok, è legato a una pagina difficile della storia di Jeju: qui persero la vita diversi civili durante la rivolta del 4·3, la sollevazione popolare del 1948 duramente repressa dal governo, uno degli eventi più segnanti e ancora sensibili della storia recente dell'isola.<br><br><b>Riconoscimento UNESCO</b><br>È stato dichiarato monumento naturale nel 2000 e nel 2007 è entrato a far parte del Patrimonio Mondiale UNESCO insieme a Geomunoreum e al Monte Halla, sotto la voce Jeju Volcanic Island and Lava Tubes.", img:"Seongsan Ilchulbong (Peak).jpg", tip:"L'ingresso apre molto presto per chi vuole vedere l'alba: controllate l'orario stagionale prima di partire, e portate una torcia se salite ancora buio.", move:"Al rientro, tappa in hotel per fare le valige e il check out (chi vuole può anche riposare un po').<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 서귀포시 성산읍 성산등용로 28"},
    {n:"[9:00] Jeju Folk Village", d:"Cercheremo di essere qui per le 9 (orario di apertura). Ci vorrebbe una mezza giornata per visitarlo tutto con calma, ma noi avremo a disposizione 1h.<br><br><b>Cos'è</b><br>È un museo etnografico a cielo aperto fondato nel 1971 con l'obiettivo di preservare l'architettura e la cultura tradizionale di Jeju prima che andassero perdute con la modernizzazione dell'isola. Oggi è considerato il più grande museo all'aperto della Corea del Sud dedicato specificamente a Jeju, ed è situato a Pyoseon, sulla costa sud-orientale.<br><br><b>Come è nato il progetto</b><br>Il villaggio non è una ricostruzione immaginaria, ma il frutto di una vera e propria ricerca d'archivio: oltre 100 abitazioni tradizionali sono state effettivamente recuperate da varie zone dell'isola, smontate e ricostruite qui pezzo per pezzo, per ricreare fedelmente l'aspetto di un villaggio di Jeju nel corso del XIX secolo.<br><br><b>Come è organizzato</b><br>Il sito riproduce diversi tipi di insediamento tipici dell'isola: un villaggio di montagna, un villaggio di media montagna, un villaggio di pescatori, un'area dedicata alle credenze popolari e allo sciamanesimo locale, oltre alla ricostruzione di un ufficio amministrativo d'epoca (yeongmun) e persino di un campo di esilio, dato che Jeju fu per secoli anche un luogo dove la dinastia Joseon mandava in esilio funzionari caduti in disgrazia.<br><br><b>La cultura che racconta</b><br>Passeggiando tra le case si possono osservare da vicino le tecniche costruttive tipiche dell'isola, pensate per resistere al vento fortissimo di Jeju: tetti di paglia legati con corde robuste, muri di pietra lavica e cortili protetti da barriere di pietra. Il museo dà spazio anche al dialetto di Jeju, molto diverso dal coreano standard e oggi considerato a rischio di estinzione, e alla struttura sociale delle haenyeo, le pescatrici subacquee che per generazioni hanno rappresentato l'asse economico portante di molte famiglie dell'isola, contribuendo a una società dalla forte impronta matriarcale rispetto al resto della Corea.<br><br><b>Un dettaglio curioso</b><br>Il villaggio è stato anche set cinematografico per diverse produzioni coreane, la più nota delle quali è la serie storica Dae Jang Geum (conosciuta anche come Jewel in the Palace), ambientata nel XV-XVI secolo e basata sulla vita della prima donna medico di corte della storia coreana: in alcune delle case sono ancora esposti costumi, oggetti di scena e materiali originali della serie.", img:"Jeju Folk Village.jpg", tip:"È disponibile anche un'audioguida, e verso la fine del percorso si trova un punto dove è possibile noleggiare un hanbok, l'abito tradizionale coreano, per foto in costume.", move:"Partenza alle 10:00 verso Soesokkak (circa 35 min).<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 서귀포시 쇠소깍로 128"},
    {n:"[10:30] Soesokkak", d:"Cercheremo di essere qui per le 10:30,in modo da fermarsi al Cafe Hello Sokkak per fare colazione e avere un paio d'ore per visitare il posto e fare un giro in canoa.<br><br><b>Come si è formato</b><br>Soesokkak è una gola scavata nella roccia lavica, formata alla foce del torrente Hyodoncheon, che nasce dalle pendici del monte Hallasan e scende fino alla costa sud dell'isola, nella zona di Seogwipo. Qui l'acqua dolce del torrente incontra quella salata del mare, creando un bacino profondo, calmo e dal caratteristico colore verde-blu intenso, racchiuso tra pareti di roccia basaltica coperte di pini.<br><br><b>Il significato del nome</b><br>Il nome originale della zona era Soedun, che significa più o meno bue disteso, un'immagine legata alla forma della gola. Nel dialetto locale di Jeju, soe indica un bue, so significa pozza d'acqua, e kkak indica la fine o il termine: nell'insieme il nome descrive quindi la pozza d'acqua alla fine del corso del torrente, prima che questo si getti in mare.<br><br><b>Una tradizione secolare: il teu</b><br>Per secoli gli abitanti della zona hanno attraversato l'estuario a bordo di piccole imbarcazioni di legno piatte, chiamate teu, tirate da una corda tesa tra le due sponde. Erano usate non solo per attraversare, ma anche per la pesca lungo il torrente, ed erano tipiche dell'economia di sussistenza dei villaggi costieri di Jeju. Oggi il giro in teu è diventato una delle attività turistiche più caratteristiche del luogo.<br><br><b>Riconoscimento e conservazione</b><br>Il 30 giugno 2011 l'amministrazione coreana per i beni culturali ha dichiarato Soesokkak sito paesaggistico protetto, riconoscendo il valore sia naturalistico sia storico dell'area per gli abitanti dei villaggi vicini, che per generazioni l'hanno usata come luogo di pesca e di svago.<br><br><b>Cosa troveremo</b><br>Oltre al giro in teu, oggi è possibile noleggiare kayak o canoe trasparenti per esplorare l'estuario, oppure semplicemente percorrere i sentieri lungo le sponde, ricchi di formazioni laviche particolari, come pareti scavate e piccole sorgenti d'acqua dolce che sgorgano dalla roccia. Soesokkak è anche il punto di passaggio tra le rotte 5 e 6 del celebre Jeju Olle Trail, la rete di sentieri escursionistici che circonda l'isola, e sfocia in una spiaggia di sabbia nera molto amata dai surfisti.", img:"Soesokkak.jpg", tip:"La zona è famosa anche per gli agrumi coltivati nei dintorni, quindi capita spesso di sentirne il profumo passeggiando nei pressi dell'estuario, specialmente in autunno e inverno durante la raccolta.", move:"Partenza alle 13:00 verso Seogwipo Maeil Olle Market (circa 15 min).<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 서귀포시 중앙로54번길 35"},
    {n:"[13:30] Pranzo: Seogwipo Maeil Olle Market", d:"Arriveremo al mercato per pranzo, non abbiamo un posto specifico dove mangiare ma si consiglia di andare alla ricerca dei panini a base di maiale nero di Jeju, degli Hallabong (i mandarini giganti) e dei dolci tipici Omegitteok e Bingtteok.<br><br><b>Cos'è e da quando esiste</b><br>È il più grande e antico mercato permanente di Seogwipo, sorto nei primi anni '60 come mercato di quartiere per la vendita quotidiana di prodotti freschi. Il nome maeil significa proprio ogni giorno in coreano, a indicare che, a differenza dei mercati periodici tipici della Corea rurale (che si tenevano solo in certi giorni del mese), questo è sempre stato aperto quotidianamente. Dal 2001 l'area commerciale si è ampliata fino a raggiungere gli attuali 620 metri di lunghezza.<br><br><b>Il significato del nome olle</b><br>La parola olle appartiene al dialetto di Jeju e indica i tradizionali vicoli stretti che collegavano le case ai sentieri principali dei villaggi dell'isola. Lo stesso termine ha dato il nome anche al celebre Jeju Olle Trail, la rete di sentieri escursionistici che circonda l'intera isola, e il mercato si trova infatti proprio lungo una delle sue tappe.<br><br><b>Cosa lo rende diverso dagli altri mercati di Jeju</b><br>A differenza del più turistico Dongmun Market di Jeju City, il mercato di Seogwipo mantiene ancora un'anima più legata alla vita quotidiana dei residenti: da un lato si trovano bancarelle di frutta, verdura, pesce e casalinghi frequentate soprattutto dagli abitanti della zona, dall'altro un tratto più orientato ai visitatori, con street food e souvenir.<br><br><b>Cosa mangiare</b><br>È il posto ideale per assaggiare in un colpo solo i prodotti simbolo dell'isola:<br><b>Hallabong</b> — il mandarino gigante e dolcissimo simbolo di Jeju, riconoscibile dalla forma un po' bitorzoluta in cima. Lo troverete fresco, ma anche sotto forma di gelato soft, succo o persino dolci fritti (gyul-hotteok, frittelle ripiene di mandarino).<br><b>Gamgyul</b> — i normali mandarini di Jeju, più piccoli e diffusissimi: l'isola ne è il maggior produttore di tutta la Corea.<br><br><b>Maiale nero (heukdwaeji)</b><br>È la razza suina autoctona di Jeju, allevata sull'isola da secoli e considerata più saporita e magra del maiale normale. Al mercato lo trovate spesso in versione street food, sotto forma di 만두빵 (manduppang) — letteralmente 'pane-mandu', perché ha la forma di un mandu (i ravioli coreani) ma la consistenza di un panino al vapore/forno. Le due varianti più diffuse sono il 불돼지 만두빵 (buldwaeji manduppang), ripieno di maiale nero piccante alla griglia, e il 치즈 만두빵 (chijeu manduppang), ripieno con formaggio filante.<br><br><b>Dolci tradizionali</b><br><b>Omegitteok</b> — un dolcetto di riso locale, tipico di Jeju, spesso ricoperto di semi o fagioli rossi dolci.<br><b>Bingtteok</b> — una crêpe di grano saraceno tipica dell'isola, arrotolata con ripieno di ravanello, un piatto povero delle famiglie contadine di un tempo.<br><br><b>Prodotti del mare</b><br>Data la tradizione delle haenyeo, non stupisce trovare bancarelle di frutti di mare freschi, tra cui l'abalone (jeonbok), molto pregiato nella cucina coreana, spesso servito in zuppa (jeonbokjuk). Probabilmente mangeremo a base di pesce in serata, quindi meglio virare sulla carne.<br><br><b>Da bere</b><br>Se vi capita, provate anche l'omegisul, un vino di riso locale a base proprio di omegitteok, oppure il vino di arachidi tipico dell'isola di Udo, spesso in vendita anche qui.", img:"Seogwipo Maeil Olle Market.jpg", tip:"Il mercato è aperto tutti i giorni dalle 7 alle 21 in estate (fino alle 20 in inverno), ma il numero di bancarelle attive varia molto in base all'orario: la sera si concentrano soprattutto quelle di cibo di strada, mentre molti negozi di prodotti freschi chiudono prima.", move:"Cascata Jeongbang è a pochi minuti d'auto dal mercato.<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 서귀포시 칠십리로214번길 37"},
    {n:"[14:30] Cascata Jeongbang (Jeongbang Pokpo)", d:"<b>Cosa la rende unica</b><br>È l'unica cascata dell'Asia orientale che si getta direttamente nel mare, invece che in un fiume o in un lago. Alta 23 metri e larga circa 10, si trova sulla costa di Seogwipo ed è considerata una delle tre cascate più importanti di Jeju, insieme a Cheonjiyeon e Cheonjeyeon. È inoltre una delle Yeongjusipgyeong, le dieci vedute più belle dell'isola secondo la tradizione locale.<br><br><b>La leggenda di Seobul e il legame con Seogwipo</b><br>La cascata è legata a una delle leggende più famose e citate di tutta Jeju. Si racconta che Seobul (conosciuto anche come Seo Bok), un funzionario di corte dell'imperatore cinese Qin Shi Huang, il primo imperatore della Cina unificata, fosse stato inviato dal sovrano intorno al III secolo a.C. alla ricerca dell'elisir di lunga vita, che si pensava crescesse sul monte Halla, allora conosciuto come Monte Yeongju. Seobul non trovò mai l'elisir, ma rimase talmente colpito dalla bellezza della cascata che, prima di ripartire, incise sulla roccia le parole Seobulgwaji, che significano più o meno qui è passato Seobul. L'iscrizione originale non esiste più oggi, ma proprio da questo episodio si fa spesso derivare il nome della città di Seogwipo, legato all'idea del ritorno di Seobul verso ovest.<br><br><b>Un'altra leggenda locale</b><br>Secondo un'antica credenza popolare, sotto la cascata viveva un drago sacro, il cui spirito si riteneva impregnasse le acque di poteri curativi, capaci persino di guarire malattie e propiziare la pioggia nei periodi di siccità.<br><br><b>Cosa troveremo</b><br>Il percorso per raggiungere la base della cascata è breve, circa 250 metri dalla biglietteria, con qualche scalinata mai troppo ripida. Una volta arrivati si può camminare fino quasi a ridosso delle rocce alla base della cascata, e da qui si vedono anche Munseom e Saeseom, due isolotti al largo della costa. Poco distante si trova anche il Seobok Exhibition Hall, un piccolo padiglione in stile cinese dedicato proprio alla figura di Seobul e alla sua leggenda.", img:"Cascata Jeongbang.jpg", tip:"È particolarmente spettacolare dopo giorni di pioggia, quando il volume d'acqua aumenta notevolmente. Bastano 20-30 minuti per la visita completa. Se possibile, andateci nel tardo pomeriggio: la luce calda del tramonto sull'acqua che cade sulla costa rocciosa è uno degli scatti più fotografati di tutta l'isola.", move:"Partenza alle 15:30 verso Songaksan Mountain Trail (circa 1h).<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 서귀포시 대정읍 송악관광로 421-1"},
    {n:"[15:30] Sanbangsan e Bomunsa Temple", d:"<b>Come si è formato</b><br>Sanbangsan è una cupola vulcanica di 395 metri, formatasi tra circa 700.000 e 800.000 anni fa da un tipo di eruzione diverso da quello degli altri rilievi dell'isola: invece di eruttare cenere e formare un cratere come la maggior parte degli oreum di Jeju, qui la lava molto densa si è semplicemente accumulata e raffreddata sul posto, dando origine a una cupola compatta e priva di cratere sommitale, un tratto che la rende geologicamente unica sull'isola.<br><br><b>Il nome e la leggenda della sua origine</b><br>Il nome Sanbangsan significa più o meno montagna con una stanza dentro, un chiaro riferimento alla grotta naturale che si apre sul suo fianco. Secondo la leggenda più diffusa, un tempo la cima del monte Halla era ben più alta di oggi: un cacciatore, mirando a un raro cervo bianco, sbagliò il colpo e ferì per errore lo spirito della montagna. Furioso, questo strappò via l'intera vetta del monte Halla e la scagliò contro il cacciatore, uccidendolo. Il masso caduto vicino al mare sarebbe diventato Sanbangsan: non a caso, si dice che il cratere del Baekrokdam, il lago sulla cima dell'Halla, abbia esattamente la forma adatta a contenere Sanbangsan, come un pezzo di puzzle mancante.<br><br><b>La grotta e la sua leggenda più intima</b><br>Salendo lungo il fianco della montagna si arriva a Sanbanggulsa, la grotta-tempio da cui l'intero monte prende il nome, alta circa 5 metri. Qui visse per un periodo il monaco Hye-il, vissuto tra il 964 e il 1053 durante la dinastia Goryeo. Un'altra leggenda locale, più intima, narra della dea Sanbandeok, figlia della montagna, innamorata di un uomo mortale di nome Goseong. Un funzionario del villaggio, geloso, lo fece bandire e gli confiscò tutti i beni: disperata, la dea si rifugiò nella grotta e lì si trasformò in pietra, ancora oggi in lutto per la perdita del suo amato. Le gocce d'acqua che cadono incessantemente dal soffitto della grotta, formando una piccola pozza, sarebbero proprio le sue lacrime: i visitatori sono invitati a berne un sorso e a esprimere un desiderio o pregare per la salute della propria famiglia.<br><br><b>Il tempio Bomunsa</b><br>Alla base della montagna si trova il complesso templare buddista di Bomunsa, che oggi si attraversa per intero prima di salire alla grotta. Le fonti divergono sull'origine esatta del tempio: alcune lo fanno risalire fino al 635 sotto la regina Seondeok della dinastia Silla, mentre altre più affidabili collocano la fondazione dell'attuale complesso nel 1954, ad opera dell'abate Dae Hyun, con ampliamenti successivi negli anni, incluso un grande Buddha dorato installato nel 2010. All'interno si possono osservare la sala principale Daeung-jeon, una statua dedicata al bodhisattva della compassione Gwanseeum-bosal e una pagoda in pietra a cinque piani.<br><br><b>Cosa vedremo</b><br>Dalla grotta la vista spazia sull'isola di Marado e sulla costa di Yongmeori, ed è considerata una delle Dieci Grandi Vedute di Jeju. Sulla scogliera di Sanbangsan cresce inoltre l'unico esemplare naturale di bosso da isola di tutta Jeju, per questo motivo l'area vegetazionale della montagna è protetta come monumento naturale.", img:"Sanbangsan Bomunsa Temple.jpg", tip:"La salita fino alla grotta richiede circa 20 minuti di cammino, non troppo impegnativo ma con qualche tratto ripido; mettendo in conto anche la visita al tempio, si arriva a circa 1,5-2 ore in totale con calma. È comodo abbinarlo nella stessa giornata a Songaksan e alla costa di Yongmeori, che si trovano proprio a pochi minuti di distanza.", move:"Yongmeori Coast è proprio ai piedi di Sanbangsan, raggiungibile in pochi minuti a piedi.<br><b>Indirizzo per Naver:</b><br><br>제주 서귀포시 안덕면 사계리 112-3"},
    {n:"[18:00] Songaksan Mountain Trail", d:"<b>Come si è formato</b><br>Songaksan è un vulcano dalla struttura piuttosto insolita: presenta un doppio cratere, con un cratere principale largo circa 500 metri e uno più piccolo, quasi verticale, che si apre al suo interno. Si è formato circa 7.000 anni fa attraverso un'eruzione idrovulcanica, simile a quella di Seongsan Ilchulbong, cioè causata dal contatto tra magma e acqua di mare. Nonostante il nome mountain, si tratta in realtà di un rilievo piuttosto basso, che raggiunge appena 104 metri sul livello del mare, ma la sua posizione sulla punta sud-occidentale dell'isola regala una delle viste più ampie su tutta la costa meridionale di Jeju.<br><br><b>Un paesaggio arido e particolare</b><br>A differenza di molte altre zone verdi dell'isola, il terreno di Songaksan è arido e povero, coperto perlopiù da erbe spontanee come l'artemisia, con pochissima vegetazione arborea a parte alcune pinete piantate artificialmente. Il pascolo del bestiame nel corso dei secoli ha contribuito a mantenere il paesaggio brullo e aperto, che oggi è parte del suo fascino.<br><br><b>Un capitolo doloroso della storia</b><br>Durante la Seconda guerra mondiale, tra il 1943 e il 1945, l'esercito giapponese trasformò Songaksan in una delle sue basi più importanti sull'isola, come parte della difesa finale contro un possibile sbarco delle forze alleate, nell'ambito di quella che i giapponesi chiamarono Operazione numero 7. Lungo le scogliere costiere furono scavate oltre 60 grotte artificiali e gallerie, di cui circa 15 sono ancora oggi visibili e riconoscibili: servivano a nascondere piccoli sommergibili, imbarcazioni suicide kamikaze e armamenti vari dagli attacchi aerei alleati. Poco distante si trova anche l'aeroporto militare di Altteureu, costruito con il lavoro forzato di civili coreani, di cui restano ancora oggi gli hangar. Questi resti sono oggi ufficialmente riconosciuti come beni culturali della Corea del Sud, proprio per il loro valore come testimonianza diretta e drammatica di quel periodo storico.<br><br><b>Cosa troveremo</b><br>Il sentiero costiero che costeggia la base del monte è semplice e adatto a tutti, e permette di vedere da vicino gli ingressi delle grotte militari, oggi non più accessibili all'interno per motivi di sicurezza. Dalla cima si gode di una vista che spazia dal monte Sanbangsan al monte Halla, fino alle isolette di Marado e Gapado al largo della costa. Il sentiero fa inoltre parte della rotta 10 del Jeju Olle Trail.", img:"Songaksan Mountain Trail.jpg", tip:"Il giro completo, tra salita al cratere e sentiero costiero, richiede circa 1-1,5 ore con calma.", move:"Partenza alle 18:00 verso Sanbangsan Bomunsa Temple.<br><b>Indirizzo per Naver:</b><br><br>제주특별자치도 서귀포시 안덕면 산방로 218-10"},
    {n:"[19:30] Yongmeori Coast", d:"Una costa di scogliere stratificate ai piedi di Sanbangsan, il cui nome ('testa di drago') deriva dalla forma della scogliera che sembra un drago che immerge la testa in mare. Le rocce, tra le più antiche di Jeju, mostrano striature sedimentarie formatesi quando l'isola era ancora sott'acqua.", img:"Yongmeori Coast.jpg", tip:"L'accesso alla costa dipende dalla marea: con l'alta marea il sentiero lungo le rocce può essere chiuso. È anche un ottimo punto per il tramonto, in linea con l'orario di arrivo previsto."}
  ]

const navContent = document.getElementById('navContent');
const page = document.getElementById('page');

function regionDays(key){ return DAYS.filter(d=>d.region===key); }

function emphasizeLast(str){
  const parts = str.split(' ');
  if(parts.length===1) return `<em>${str}</em>`;
  const last = parts.pop();
  return `${parts.join(' ')} <em>${last}</em>`;
}

function buildSidebar(){
  let html = `<div class="navgroup">
    <button class="infolink" data-target="info" id="navInfo">🧭 &nbsp;Prima di partire</button>
  </div>
  <div class="navgroup"><div class="navgroup-label">Itinerario giorno per giorno</div>`;

  Object.keys(REGIONS).forEach(key=>{
    if(key==="info") return;
    const r = REGIONS[key];
    const days = regionDays(key);
    if(!days.length) return;
    html += `<div class="region-block">
      <div class="region-head"><span class="dot" style="background:${r.color}"></span>${r.label}</div>`;
    days.forEach(d=>{
      html += `<button class="daylink" data-target="day-${d.id}" data-region="${key}" style="--accent:${r.color}">
        <span class="num">${String(d.id).padStart(2,'0')}</span> ${d.date.split(' ').slice(0,2).join(' ')}
      </button>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  navContent.innerHTML = html;

  navContent.querySelectorAll('.daylink').forEach(btn=>{
    btn.addEventListener('click', ()=> showDay(parseInt(btn.dataset.target.replace('day-',''))));
  });
  document.getElementById('navInfo').addEventListener('click', showInfo);
}

function setActiveNav(target){
  document.querySelectorAll('.daylink, .infolink').forEach(el=>el.classList.remove('active'));
  const el = document.querySelector(`[data-target="${target}"]`);
  if(el) el.classList.add('active');
}

function galleryCardHTML(p, accent, i){
  const media = p.img
    ? `<img class="g-img" src="${p.img}" alt="${p.n}" loading="lazy">`
    : `<div class="g-img-ph" style="--accent:${accent}">${p.n}</div>`;
  return `<div class="g-card">
    ${media}
    <div class="g-cap"><h4>${p.n}</h4><span class="g-num">${String(i+1).padStart(2,'0')}</span></div>
    <p>${p.d}</p>
    ${p.tip ? `<div class="tip"><b>💡</b><span>${p.tip}</span></div>` : ''}
    ${p.move ? `<div class="tip"><b>🚗</b><span>${p.move}</span></div>` : ''}
  </div>`;
}

function showDay(id){
  const d = DAYS.find(x=>x.id===id);
  if(!d) return;
  const r = REGIONS[d.region];
  const idx = DAYS.findIndex(x=>x.id===id);
  const prev = DAYS[idx-1];
  const next = DAYS[idx+1];
  const heroImg = HERO_IMG[d.region] || '';

  page.innerHTML = `
    <div class="hero" style="--accent:${r.color};${heroImg ? `background-image:url('${heroImg}')` : `background:linear-gradient(135deg,${r.color},#20242c)`}">
      <div class="hero-inner">
        <div class="hero-eyebrow">§ ${String(d.id).padStart(2,'0')} / 16 <span class="sep">·</span> ${r.label} <span class="sep">·</span> ${d.date}</div>
        <h2>${emphasizeLast(d.city)}</h2>
        <div class="sub">${d.hotel && d.hotel !== '—' ? 'Pernottamento: ' + d.hotel : ''}</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><b>${String(d.id).padStart(2,'0')} / 16</b><span>Giorno di viaggio</span></div>
      ${d.flight ? `<div class="stat"><b>✈</b><span>${d.flight}</span></div>` : ''}
      <div class="stat"><b>${d.schedule && d.schedule.length ? d.schedule.length : '—'}</b><span>Tappe in programma</span></div>
    </div>

    ${d.note ? `<div class="note-box">${d.note}</div>` : ''}

    <div class="content-pad">
    ${d.schedule && d.schedule.length ? `
    <div class="block-title">Programma orario</div>
    <div class="legend" style="--accent:${r.color}">
      <span><i></i>Tappa/visita</span>
      <span><i class="meal-i"></i>Pasto</span>
      <span><i class="transfer-i"></i>Spostamento / partenza</span>
      <span><i class="logistics-i"></i>Sveglia · check-in/out · bagagli</span>
    </div>
    <div class="timeline" style="--accent:${r.color}">
      ${d.schedule.map(s=>`<div class="tl-item ${s.type}" style="--accent:${r.color}">
        <div class="tl-time">${s.time}</div>
        <div class="tl-text">${s.text}</div>
      </div>`).join('')}
    </div>` : ''}

    ${d.places && d.places.length ? `
    <div class="block-title">Cosa vedrete — info utili</div>
    <div class="gallery">
      ${d.places.map((p,i)=>galleryCardHTML(p, r.color, i)).join('')}
    </div>` : ''}
    </div>

    <div class="foot-nav">
      <button class="foot-btn" ${prev? '' : 'disabled'} id="prevBtn">
        <span class="lbl">← Giorno precedente</span>
        <span class="nm">${prev ? prev.city + ' — ' + prev.date : ''}</span>
      </button>
      <button class="foot-btn right" ${next? '' : 'disabled'} id="nextBtn">
        <span class="lbl">Giorno successivo →</span>
        <span class="nm">${next ? next.city + ' — ' + next.date : ''}</span>
      </button>
    </div>
  `;
  setActiveNav(`day-${id}`);
  window.scrollTo({top:0, behavior:'instant'});
  if(prev) document.getElementById('prevBtn').addEventListener('click', ()=>showDay(prev.id));
  if(next) document.getElementById('nextBtn').addEventListener('click', ()=>showDay(next.id));
  closeMobileNav();
}

function showInfo(){
  const totalDays = DAYS.length;
  const totalRegions = Object.keys(REGIONS).length - 1;
  page.innerHTML = `
    <div class="info-hero">
      <div class="info-hero-inner">
        <div class="hero-eyebrow">🧭 Guida rapida</div>
        <h2>Prima di <em>partire</em></h2>
        <p>${INFO.intro}</p>
      </div>
    </div>
    <div class="info-stats">
      <div class="stat"><b>${totalDays}</b><span>Giorni di viaggio</span></div>
      <div class="stat"><b>${totalRegions}</b><span>Tappe · regioni</span></div>
      <div class="stat"><b>15—30</b><span>Agosto 2026</span></div>
    </div>
    <div class="info-grid">
      ${INFO.cards.map(c=>`
        <div class="info-card">
          <h3>${c.icon} ${c.title}</h3>
          <ul>${c.items.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>
      `).join('')}
    </div>
  `;
  setActiveNav('info');
  window.scrollTo({top:0, behavior:'instant'});
  closeMobileNav();
}

/* mobile nav toggle */
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
document.getElementById('menuToggle').addEventListener('click', ()=>{
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});
overlay.addEventListener('click', ()=>{
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
});
function closeMobileNav(){
  if(window.innerWidth<=900){ sidebar.classList.remove('open'); overlay.classList.remove('show'); }
}

/* init */
buildSidebar();
showInfo();
</script>
</body>
</html>
